services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ezone}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ezone1234}
      POSTGRES_DB: ${POSTGRES_DB:-ezone_mes}
      POSTGRES_INITDB_ARGS: "--locale=ko_KR.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ezone} -d ${POSTGRES_DB:-ezone_mes}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ezone}:${POSTGRES_PASSWORD:-ezone1234}@db:5432/${POSTGRES_DB:-ezone_mes}
      PORT: 3000
      NODE_ENV: development
      CORS_ORIGIN: http://localhost:5173
    volumes:
      - ./backend/src:/app/backend/src
      - ./packages:/app/packages
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000
    volumes:
      - ./frontend/src:/app/frontend/src
      - ./frontend/index.html:/app/frontend/index.html
    depends_on:
      - backend

volumes:
  pgdata:
